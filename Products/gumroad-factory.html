<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gumroad Factory — 10-Step Product Launch Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #faf9f7;
  --surface: #ffffff;
  --panel: #f4f2ef;
  --border: #e5e2db;
  --border-dark: #ccc9c0;
  --ink: #1a1814;
  --ink2: #4a4740;
  --muted: #9a9690;
  --accent: #ff4d00;
  --accent-light: #fff3ee;
  --accent-border: #ffcfb8;
  --green: #00875a;
  --green-light: #e8f5ef;
  --blue: #0057b8;
  --blue-light: #eef4ff;
  --yellow: #b45309;
  --yellow-light: #fef9ee;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'Fira Code', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.5;
}

/* Layout */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  background: var(--ink);
  color: #e8e5df;
  padding: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-brand {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-brand h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #fff;
}

.sidebar-brand p {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  font-family: var(--mono);
}

.sidebar-project {
  padding: 16px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.sidebar-project label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
}

.sidebar-project input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  color: #fff;
  font-family: var(--font);
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
}

.sidebar-project input:focus {
  border-color: var(--accent);
}

.sidebar-project input::placeholder { color: rgba(255,255,255,0.2); }

.steps-nav { flex: 1; padding: 12px 0; }

.step-nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}

.step-nav-item:hover { background: rgba(255,255,255,0.04); }

.step-nav-item.active {
  background: rgba(255,77,0,0.12);
  border-left-color: var(--accent);
}

.step-nav-item.done .step-num {
  background: var(--green);
  color: #fff;
}

.step-nav-item.done .step-nav-title { color: #ccc; }

.step-num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  color: var(--muted);
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: var(--mono);
  transition: background 0.2s;
}

.step-nav-item.active .step-num {
  background: var(--accent);
  color: #fff;
}

.step-nav-title {
  font-size: 12px;
  font-weight: 500;
  color: #a0998f;
  line-height: 1.2;
}

.step-nav-item.active .step-nav-title { color: #fff; }

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 10px;
  color: var(--muted);
  font-family: var(--mono);
}

/* Main */
.main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

.step-breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}

.step-breadcrumb .step-tag {
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid var(--accent-border);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
}

.step-breadcrumb .step-name {
  font-weight: 600;
  color: var(--ink);
}

.topbar-actions {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 8px 16px;
  border-radius: 6px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #e04400; }
.btn-primary:disabled { background: var(--border-dark); color: var(--muted); cursor: not-allowed; }

.btn-secondary {
  background: var(--panel);
  color: var(--ink2);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }

.btn-ghost {
  background: none;
  color: var(--ink2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--panel); }

/* Content area */
.content {
  flex: 1;
  padding: 40px;
  max-width: 860px;
}

.step-header {
  margin-bottom: 32px;
}

.step-header h2 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 8px;
}

.step-header p {
  font-size: 14px;
  color: var(--ink2);
  line-height: 1.6;
  max-width: 620px;
}

/* Input card */
.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 24px;
}

.input-card-header {
  padding: 14px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.field-group {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.field label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
}

.field input, .field textarea, .field select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--ink);
  font-family: var(--font);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,77,0,0.08);
}

.field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

.field small {
  font-size: 11px;
  color: var(--muted);
}

/* Generate button area */
.generate-row {
  padding: 16px 20px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.prompt-preview {
  flex: 1;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Output card */
.output-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.output-card-header {
  padding: 12px 20px;
  background: var(--green-light);
  border-bottom: 1px solid #c3e6d4;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
}

.output-card-header .copy-btn {
  padding: 4px 10px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 11px;
  font-family: var(--font);
  cursor: pointer;
  transition: background 0.15s;
}

.output-card-header .copy-btn:hover { background: #006644; }

.output-body {
  padding: 24px;
  font-size: 13px;
  line-height: 1.8;
  color: var(--ink2);
  white-space: pre-wrap;
  font-family: var(--mono);
  min-height: 120px;
  max-height: 500px;
  overflow-y: auto;
}

.output-body.streaming { color: var(--ink); }

.output-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 160px;
  color: var(--muted);
  font-family: var(--font);
  font-size: 13px;
  gap: 8px;
}

.output-placeholder .icon { font-size: 28px; opacity: 0.3; }

/* Loading */
.loading-dots {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}

.loading-dots span {
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  animation: dot 1.2s infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* Progress bar */
.progress-strip {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 12px 40px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.progress-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.progress-label {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--muted);
  white-space: nowrap;
}

/* Navigation footer */
.nav-footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
}

.nav-footer-info {
  font-size: 12px;
  color: var(--muted);
}

/* Context pills (carryover data from prev steps) */
.context-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.ctx-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--blue-light);
  border: 1px solid #c3d9ff;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--blue);
}

.ctx-pill .ctx-key { font-weight: 600; }

/* Alert */
.alert {
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.alert-yellow {
  background: var(--yellow-light);
  border: 1px solid #fde68a;
  color: var(--yellow);
}

/* Step summary cards (for completed steps) */
.summary-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.summary-chip {
  background: var(--green-light);
  border: 1px solid #c3e6d4;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--green);
  font-family: var(--mono);
}

/* Responsive */
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content { padding: 24px 20px; }
  .topbar { padding: 12px 20px; }
  .nav-footer { padding: 16px 20px; }
  .progress-strip { padding: 10px 20px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>Gumroad Factory</h1>
      <p>10-step product engine</p>
    </div>
    <div class="sidebar-project">
      <label>Active Project</label>
      <input type="text" id="project_name" placeholder="My digital product…" oninput="updateProjectName()"/>
    </div>
    <nav class="steps-nav" id="steps_nav"></nav>
    <div class="sidebar-footer">AI-powered · Claude Sonnet 4</div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <div class="step-breadcrumb">
        <span class="step-tag" id="tb_tag">STEP 1</span>
        <span class="step-name" id="tb_name">Market Gap Finder</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="exportSession()">↓ Export</button>
        <button class="btn btn-secondary" onclick="resetSession()">↺ Reset</button>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-strip">
      <div class="progress-track">
        <div class="progress-fill" id="progress_fill" style="width:10%"></div>
      </div>
      <div class="progress-label" id="progress_label">Step 1 of 10</div>
    </div>

    <!-- Content -->
    <div class="content" id="step_content"></div>

    <!-- Nav footer -->
    <div class="nav-footer">
      <button class="btn btn-secondary" id="btn_prev" onclick="prevStep()">← Previous</button>
      <div class="nav-footer-info" id="nav_info"></div>
      <button class="btn btn-primary" id="btn_next" onclick="nextStep()">Next Step →</button>
    </div>

  </div>
</div>

<script>
const STEPS = [
  {
    id: 1,
    title: 'Market Gap Finder',
    icon: '🔍',
    desc: 'Identify high-demand, low-competition product opportunities on Gumroad before building anything.',
    fields: [
      { key: 'expertise', label: 'Your Expertise Areas', type: 'textarea', placeholder: 'e.g. Node.js, TypeScript, AI agent development, API design, serverless…', required: true },
      { key: 'years_exp', label: 'Years of Experience', type: 'input', placeholder: 'e.g. 10+' },
      { key: 'target_price', label: 'Target Price Range', type: 'input', placeholder: 'e.g. $29–$97' },
    ],
    buildPrompt: (ctx) => `I'm a software engineer with ${ctx.years_exp || '10+'} years of experience specializing in ${ctx.expertise}.

I want to create a digital product to sell on Gumroad. Analyze the current Gumroad marketplace and identify 5 product opportunities that meet ALL of these criteria:
- Targets a specific professional audience (not general consumers)
- Solves a concrete, recurring pain point
- Can be delivered as a downloadable digital product (PDF, template, code kit, spreadsheet, HTML tool, etc.)
- Has low competition but provable demand
- Can be created by one person in under 20 hours
- Can reasonably be priced in the ${ctx.target_price || '$19–$97'} range

For each opportunity provide:
1. The specific product concept
2. Who exactly would buy it and why
3. What search terms or communities indicate demand
4. Why existing solutions are inadequate
5. A rough outline of what the product would contain
6. Realistic 90-day revenue estimate

Be brutally honest about which ideas have real commercial potential versus which ones just sound interesting. Rank them from highest to lowest opportunity.`,
  },
  {
    id: 2,
    title: 'Product Spec Generator',
    icon: '📋',
    desc: 'Turn your chosen product idea into a tight specification with scope, deliverables, and production plan.',
    fields: [
      { key: 'product_concept', label: 'Chosen Product Concept', type: 'textarea', placeholder: 'Paste the winning idea from Step 1…', required: true },
      { key: 'target_audience', label: 'Target Audience', type: 'input', placeholder: 'e.g. Freelance Node.js developers' },
      { key: 'max_hours', label: 'Max Build Hours', type: 'input', placeholder: 'e.g. 15' },
    ],
    buildPrompt: (ctx) => `I'm creating a digital product for Gumroad: ${ctx.product_concept}

Target audience: ${ctx.target_audience || 'professional developers/creators'}
Max build time available: ${ctx.max_hours || '15'} hours

Create a detailed product specification including:

1. PRODUCT STRUCTURE
   - Exact deliverables (files, formats, page counts)
   - Table of contents or full component list
   - Bonus materials that would increase perceived value

2. CONTENT DEPTH
   - For each section/component, specify the level of detail needed
   - Which sections require original expertise vs. assembled best practices
   - Sections that need code examples, screenshots, or diagrams

3. DIFFERENTIATION
   - What makes this specifically better than free alternatives?
   - What "aha moment" should the buyer experience?
   - What would make someone recommend this to a colleague?

4. SCOPE BOUNDARIES
   - What this product explicitly does NOT cover (and why)
   - Required buyer experience level
   - Prerequisites or assumptions

5. PRODUCTION ESTIMATE
   - Estimated hours per section
   - Which sections to write personally vs. draft with AI
   - Optimal creation order for maximum efficiency

Format as a project brief I can reference throughout the build.`,
  },
  {
    id: 3,
    title: 'Landing Page Copy',
    icon: '✍️',
    desc: 'Write conversion-focused sales copy that speaks directly to your buyer\'s pain — not generic buzzwords.',
    fields: [
      { key: 'product_name', label: 'Product Name', type: 'input', placeholder: 'e.g. The Node.js API Starter Kit', required: true },
      { key: 'price', label: 'Price', type: 'input', placeholder: 'e.g. $47' },
      { key: 'core_promise', label: 'Core Promise (one sentence)', type: 'input', placeholder: 'e.g. Ship a production-ready API in 1 hour instead of 20' },
    ],
    buildPrompt: (ctx) => `Write Gumroad landing page copy for the following digital product:

Product: ${ctx.product_name}
Target buyer: ${ctx.target_audience || 'professional developers and solopreneurs'}
Price: ${ctx.price || '$47'}
Core promise: ${ctx.core_promise}

Structure the copy as follows:

HEADLINE: Specific, benefit-driven, creates urgency or curiosity. No "ultimate guide" language.

SUBHEADLINE: One sentence that qualifies the audience and reinforces the headline.

PAIN SECTION (4 bullets): Specific frustrations the buyer is experiencing RIGHT NOW. Use "you" language. Be viscerally specific — not "struggling with APIs" but "spending three hours debugging a 401 error because auth middleware is silently swallowing your token."

SOLUTION SECTION: 2–3 short paragraphs explaining what the product is and how it solves the pains. Include specific details (page count, number of templates, lines of code, etc.)

WHAT'S INSIDE (8 bullets): Specific deliverables with brief descriptions. Each should make the buyer think "oh, I need that specifically."

WHO THIS IS FOR: 4 bullets describing the ideal buyer. Include one "this is NOT for you if..." bullet to build credibility.

SOCIAL PROOF PLACEHOLDER: Suggest 3 types of testimonials or credibility signals to collect.

CTA: A compelling call-to-action more specific than "Buy Now."

Write in a conversational, direct tone. No corporate speak. No buzzwords. Write like a developer talking to another developer who respects their time.`,
  },
  {
    id: 4,
    title: 'Cover Art Brief',
    icon: '🎨',
    desc: 'Generate image prompts and design directions for a cover that converts at thumbnail size.',
    fields: [
      { key: 'product_name', label: 'Product Name', type: 'input', placeholder: 'e.g. The Node.js API Starter Kit', required: true },
      { key: 'category', label: 'Product Category', type: 'input', placeholder: 'e.g. Technical / Code Kit' },
      { key: 'tone', label: 'Tone/Vibe', type: 'input', placeholder: 'e.g. Professional, minimal, dark theme' },
    ],
    buildPrompt: (ctx) => `Create detailed image generation prompts for a Gumroad product cover image:

Product: ${ctx.product_name}
Category: ${ctx.category || 'Technical/Developer'}
Tone: ${ctx.tone || 'Professional, modern, minimal'}

Requirements:
- 1280x720 pixels (Gumroad recommended)
- Must work as small thumbnail AND at full size
- Communicate "professional digital product" not "stock photo garbage"
- Include product title text in design
- Stand out on Gumroad's white background

Generate THREE different concept directions:

CONCEPT 1 — Typography-focused (minimal):
- Exact prompt for Midjourney/DALL-E/Stable Diffusion
- Font suggestions and text placement
- Color hex codes
- Post-processing notes for Canva/Figma

CONCEPT 2 — Illustrated/iconographic approach:
- Exact prompt
- Font suggestions
- Color palette
- Post-processing notes

CONCEPT 3 — Abstract/data visualization:
- Exact prompt
- Font suggestions
- Color palette
- Post-processing notes

Then recommend which concept will perform best for a technical audience on Gumroad, and why.`,
  },
  {
    id: 5,
    title: 'Content Drafter',
    icon: '📝',
    desc: 'Draft the actual product content — section by section, with depth that justifies the price tag.',
    fields: [
      { key: 'section_title', label: 'Section to Draft', type: 'input', placeholder: 'e.g. Section 1: Authentication & JWT Setup', required: true },
      { key: 'product_type', label: 'Product Type', type: 'input', placeholder: 'e.g. Code starter kit with guide PDF' },
      { key: 'audience_level', label: 'Audience Experience Level', type: 'input', placeholder: 'e.g. Mid-level developer, 2+ years Node.js' },
      { key: 'word_target', label: 'Target Word Count', type: 'input', placeholder: 'e.g. 800' },
    ],
    buildPrompt: (ctx) => `I'm creating ${ctx.product_type || 'a technical digital product'} about ${ctx.product_concept || 'developer tooling'}.

Draft Section: ${ctx.section_title}

Requirements:
- Write for an audience of ${ctx.audience_level || 'experienced developers'}
- Include practical, copy-paste-ready code examples and templates
- Every concept must be tied to a real-world use case
- Use concrete numbers and specifics, not vague advice
- Target length: ${ctx.word_target || '600–900'} words for this section

Style guidelines:
- First person where appropriate ("In my experience..." not "It is commonly understood...")
- Technical accuracy is non-negotiable — flag anything uncertain
- Include "Pro tip:" callouts for non-obvious insights
- End with a clear action item or takeaway
- Include error handling in every code example
- Add comments explaining the "why" not just the "what"
- Make examples self-contained and runnable

Do NOT pad with filler content. If the section can be covered well in fewer words, use fewer words. Quality over quantity.`,
  },
  {
    id: 6,
    title: 'Pricing Strategist',
    icon: '💰',
    desc: 'Find the optimal price point, tier structure, and launch strategy — with realistic revenue projections.',
    fields: [
      { key: 'product_name', label: 'Product Name', type: 'input', placeholder: 'e.g. The Node.js API Starter Kit', required: true },
      { key: 'build_hours', label: 'Actual Build Hours', type: 'input', placeholder: 'e.g. 12' },
      { key: 'competitors', label: 'Competitor Products & Prices', type: 'textarea', placeholder: 'e.g. "Generic API boilerplate on Gumroad $19, Udemy course $29, GitHub repo free"' },
      { key: 'credibility', label: 'Your Credibility/Background', type: 'input', placeholder: 'e.g. 10 years Node.js, shipped 3 production APIs' },
    ],

// State
let currentStep = 0;
let session = {};

// Load saved session
try {
  const saved = localStorage.getItem('gf_session');
  if (saved) session = JSON.parse(saved);
} catch(e) {}

function save() {
  try { localStorage.setItem('gf_session', JSON.stringify(session)); } catch(e) {}
}

function updateProjectName() {
  session.project_name = document.getElementById('project_name').value;
  save();
}

function buildSidebar() {
  const nav = document.getElementById('steps_nav');
  nav.innerHTML = STEPS.map((s, i) => {
    const done = session[`step${s.id}_output`];
    const active = i === currentStep;
    return `<div class="step-nav-item ${active ? 'active' : ''} ${done ? 'done' : ''}" onclick="goToStep(${i})">
      <div class="step-num">${done ? '✓' : s.id}</div>
      <div class="step-nav-title">${s.title}</div>
    </div>`;
  }).join('');

  if (session.project_name) {
    document.getElementById('project_name').value = session.project_name;
  }
}

function updateTopBar() {
  const s = STEPS[currentStep];
  document.getElementById('tb_tag').textContent = `STEP ${s.id}`;
  document.getElementById('tb_name').textContent = s.title;
  document.getElementById('progress_fill').style.width = ((currentStep + 1) / STEPS.length * 100) + '%';
  document.getElementById('progress_label').textContent = `Step ${currentStep + 1} of ${STEPS.length}`;
  document.getElementById('btn_prev').disabled = currentStep === 0;
  document.getElementById('btn_next').textContent = currentStep === STEPS.length - 1 ? '✓ Complete' : 'Next Step →';
  document.getElementById('nav_info').textContent = STEPS[currentStep].icon + ' ' + STEPS[currentStep].desc.slice(0, 60) + '…';
}

function renderStep() {
  const s = STEPS[currentStep];
  const stepKey = `step${s.id}`;
  const savedOutput = session[`${stepKey}_output`];

  // Build context pills from prev steps
  let contextHTML = '';
  const ctxItems = [];
  if (session.expertise) ctxItems.push(['Expertise', session.expertise.slice(0,30) + (session.expertise.length > 30 ? '…' : '')]);
  if (session.product_concept && s.id > 2) ctxItems.push(['Concept', session.product_concept.slice(0,30) + '…']);
  if (session.product_name && s.id > 3) ctxItems.push(['Product', session.product_name]);
  if (session.target_audience && s.id > 1) ctxItems.push(['Audience', session.target_audience]);

  if (ctxItems.length > 0) {
    contextHTML = `<div class="context-bar">
      ${ctxItems.map(([k,v]) => `<div class="ctx-pill"><span class="ctx-key">${k}:</span> ${v}</div>`).join('')}
    </div>`;
  }

  // Fields
  const fieldsHTML = s.fields.map(f => {
    const savedVal = session[f.key] || '';
    const req = f.required ? ' *' : '';
    const input = f.type === 'textarea'
      ? `<textarea id="field_${f.key}" placeholder="${f.placeholder}" rows="3">${savedVal}</textarea>`
      : `<input type="text" id="field_${f.key}" value="${savedVal}" placeholder="${f.placeholder}"/>`;
    return `<div class="field">
      <label>${f.label}${req}</label>
      ${input}
      ${f.hint ? `<small>${f.hint}</small>` : ''}
    </div>`;
  }).join('');

  // Output area
  const outputHTML = savedOutput
    ? `<div class="output-card">
        <div class="output-card-header">
          <span>✓ Claude's Output — Step ${s.id}: ${s.title}</span>
          <button class="copy-btn" onclick="copyOutput(${s.id})">Copy</button>
        </div>
        <div class="output-body">${escapeHtml(savedOutput)}</div>
       </div>`
    : `<div class="output-card">
        <div class="output-card-header" style="background:#faf9f7;border-color:var(--border);color:var(--muted)">
          <span>Output will appear here</span>
        </div>
        <div class="output-body">
          <div class="output-placeholder">
            <div class="icon">${s.icon}</div>
            <div>Fill in the fields above, then click Generate</div>
          </div>
        </div>
       </div>`;

  document.getElementById('step_content').innerHTML = `
    <div class="step-header">
      <h2>${s.icon} ${s.title}</h2>
      <p>${s.desc}</p>
    </div>
    ${contextHTML}
    <div class="input-card">
      <div class="input-card-header">📥 Your Inputs</div>
      <div class="field-group">${fieldsHTML}</div>
      <div class="generate-row">
        <div class="prompt-preview" id="prompt_preview">Fill fields to preview the prompt…</div>
        <button class="btn btn-primary" id="gen_btn" onclick="generate(${s.id})">
          ⚡ Generate with Claude
        </button>
      </div>
    </div>
    ${outputHTML}
  `;

  // Live prompt preview
  s.fields.forEach(f => {
    const el = document.getElementById(`field_${f.key}`);
    if (el) el.addEventListener('input', () => updatePromptPreview(s));
  });
  updatePromptPreview(s);
}

function updatePromptPreview(s) {
  const ctx = collectFields(s);
  const prompt = s.buildPrompt(ctx);
  const preview = document.getElementById('prompt_preview');
  if (preview) preview.textContent = `~${Math.round(prompt.length/4)} tokens · "${prompt.slice(0,80)}…"`;
}

function collectFields(s) {
  const ctx = { ...session };
  s.fields.forEach(f => {
    const el = document.getElementById(`field_${f.key}`);
    if (el) ctx[f.key] = el.value.trim();
  });
  return ctx;
}

async function generate(stepId) {
  const s = STEPS.find(x => x.id === stepId);
  const ctx = collectFields(s);

  // Validate required
  const missing = s.fields.filter(f => f.required && !ctx[f.key]);
  if (missing.length > 0) {
    alert(`Please fill in: ${missing.map(f => f.label).join(', ')}`);
    return;
  }

  // Save field values to session
  s.fields.forEach(f => { if (ctx[f.key]) session[f.key] = ctx[f.key]; });
  save();

  const prompt = s.buildPrompt(ctx);
  const btn = document.getElementById('gen_btn');
  btn.disabled = true;
  btn.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div> Generating…`;

  // Show streaming output card
  const content = document.getElementById('step_content');
  let outCard = content.querySelector('.output-card');
  if (!outCard) {
    outCard = document.createElement('div');
    outCard.className = 'output-card';
    content.appendChild(outCard);
  }
  outCard.innerHTML = `
    <div class="output-card-header">
      <span>⚡ Claude is generating…</span>
    </div>
    <div class="output-body streaming" id="stream_out"></div>
  `;

  let fullText = '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1800,
        system: `You are a world-class Gumroad product strategist and digital product creator. You help indie hackers, developers, and solopreneurs build and launch high-converting digital products. Be specific, commercially realistic, and actionable. Format your output with clear sections using ALL-CAPS headers, bullet points, and numbered lists for readability.`,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();

    if (data.content && data.content[0]) {
      fullText = data.content[0].text;
    } else if (data.error) {
      fullText = `Error: ${data.error.message}`;
    }

  } catch (err) {
    fullText = `Network error: ${err.message}`;
  }

  // Simulate streaming effect
  const streamEl = document.getElementById('stream_out');
  if (streamEl) {
    streamEl.textContent = '';
    let i = 0;
    const chunk = 12;
    const interval = setInterval(() => {
      streamEl.textContent += fullText.slice(i, i + chunk);
      streamEl.scrollTop = streamEl.scrollHeight;
      i += chunk;
      if (i >= fullText.length) clearInterval(interval);
    }, 16);
  }

  // Save output
  session[`step${stepId}_output`] = fullText;
  save();

  // Update card header after a moment
  setTimeout(() => {
    outCard.innerHTML = `
      <div class="output-card-header">
        <span>✓ Claude's Output — Step ${stepId}: ${s.title}</span>
        <button class="copy-btn" onclick="copyOutput(${stepId})">Copy</button>
      </div>
      <div class="output-body">${escapeHtml(fullText)}</div>
    `;
  }, Math.ceil(fullText.length / 12) * 16 + 200);

  btn.disabled = false;
  btn.innerHTML = '⚡ Re-generate';
  buildSidebar();
}

function copyOutput(stepId) {
  const text = session[`step${stepId}_output`];
  if (text) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); }
    });
  }
}

function goToStep(index) {
  currentStep = index;
  buildSidebar();
  updateTopBar();
  renderStep();
  window.scrollTo(0, 0);
}

function nextStep() {
  if (currentStep < STEPS.length - 1) goToStep(currentStep + 1);
}

function prevStep() {
  if (currentStep > 0) goToStep(currentStep - 1);
}

function exportSession() {
  const lines = STEPS.map(s => {
    const out = session[`step${s.id}_output`];
    return out ? `# STEP ${s.id}: ${s.title}\n\n${out}\n\n---\n` : '';
  }).filter(Boolean).join('\n');

  const name = session.product_name || session.project_name || 'gumroad-product';
  const blob = new Blob([lines], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${name.toLowerCase().replace(/\s+/g,'-')}-factory-export.md`;
  a.click();
}

function resetSession() {
  if (!confirm('Reset all progress? This clears all saved inputs and outputs.')) return;
  session = {};
  try { localStorage.removeItem('gf_session'); } catch(e) {}
  goToStep(0);
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// Init
buildSidebar();
updateTopBar();
renderStep();
</script>
</body>
</html>
