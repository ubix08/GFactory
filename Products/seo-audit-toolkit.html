<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Audit Pro — Professional SEO Audit Toolkit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0b0d;
    --bg-1: #0f1114;
    --bg-2: #151820;
    --bg-3: #1c2130;
    --bg-4: #222840;
    --border: #2a3248;
    --border-bright: #3d4f72;
    --phosphor: #39ff8c;
    --phosphor-dim: #1a7a42;
    --phosphor-glow: rgba(57,255,140,0.12);
    --amber: #ffb347;
    --amber-dim: #7a5520;
    --red: #ff4757;
    --red-dim: #7a1f28;
    --blue: #4ecdc4;
    --blue-dim: #1a4a46;
    --text-0: #e8ecf5;
    --text-1: #a0adc4;
    --text-2: #5a6882;
    --text-3: #3a4560;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-0);
    color: var(--text-0);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-1); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--phosphor);
    text-shadow: 0 0 20px var(--phosphor-glow);
    line-height: 1;
  }

  .logo-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-2);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .sidebar-section {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-3);
    padding: 0 20px 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    color: var(--text-1);
    font-size: 13px;
    font-weight: 400;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }

  .nav-item:hover { color: var(--text-0); background: var(--bg-2); }
  .nav-item.active { color: var(--phosphor); background: var(--phosphor-glow); border-left-color: var(--phosphor); }

  .nav-item .nav-icon { font-size: 15px; opacity: 0.7; width: 18px; text-align: center; }
  .nav-item .nav-score {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
  }

  .score-high { background: rgba(57,255,140,0.15); color: var(--phosphor); }
  .score-mid { background: rgba(255,179,71,0.15); color: var(--amber); }
  .score-low { background: rgba(255,71,87,0.15); color: var(--red); }
  .score-na { background: var(--bg-3); color: var(--text-3); }

  .sidebar-projects {
    padding: 16px 0;
    flex: 1;
    overflow-y: auto;
  }

  .project-item {
    padding: 10px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }

  .project-item:hover { background: var(--bg-2); }
  .project-item.active { border-left-color: var(--phosphor); background: var(--phosphor-glow); }

  .project-domain {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-0);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .project-meta {
    font-size: 11px;
    color: var(--text-2);
    margin-top: 2px;
    display: flex;
    justify-content: space-between;
  }

  .btn-new-project {
    margin: 12px 16px;
    padding: 10px;
    background: var(--phosphor-glow);
    border: 1px solid var(--phosphor-dim);
    color: var(--phosphor);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    text-align: center;
    transition: all 0.2s;
  }

  .btn-new-project:hover { background: rgba(57,255,140,0.2); border-color: var(--phosphor); }

  /* MAIN CONTENT */
  .main {
    margin-left: 260px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .topbar {
    height: 58px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-domain {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-0);
    flex: 1;
  }

  .topbar-domain span { color: var(--text-2); margin-right: 8px; }

  .topbar-date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-2);
  }

  .btn {
    padding: 7px 16px;
    border: 1px solid;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.5px;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-ghost { background: transparent; border-color: var(--border-bright); color: var(--text-1); }
  .btn-ghost:hover { border-color: var(--text-1); color: var(--text-0); }
  .btn-primary { background: var(--phosphor-glow); border-color: var(--phosphor); color: var(--phosphor); }
  .btn-primary:hover { background: rgba(57,255,140,0.22); }
  .btn-danger { background: rgba(255,71,87,0.1); border-color: var(--red-dim); color: var(--red); }
  .btn-danger:hover { background: rgba(255,71,87,0.2); }

  /* PAGE CONTENT */
  .content { padding: 28px; max-width: 1200px; }

  /* DASHBOARD */
  .dashboard-header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    margin-bottom: 28px;
    align-items: start;
  }

  .overall-score-ring {
    width: 140px;
    height: 140px;
    position: relative;
  }

  .score-ring-svg { transform: rotate(-90deg); }
  .score-ring-bg { fill: none; stroke: var(--bg-3); stroke-width: 8; }
  .score-ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1); }

  .score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-number {
    font-family: var(--font-display);
    font-size: 42px;
    line-height: 1;
  }

  .score-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-2);
    margin-top: 2px;
  }

  .score-grade {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 1px;
  }

  /* STAT CARDS */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.green::before { background: var(--phosphor); }
  .stat-card.amber::before { background: var(--amber); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.blue::before { background: var(--blue); }

  .stat-value {
    font-family: var(--font-display);
    font-size: 36px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card.green .stat-value { color: var(--phosphor); }
  .stat-card.amber .stat-value { color: var(--amber); }
  .stat-card.red .stat-value { color: var(--red); }
  .stat-card.blue .stat-value { color: var(--blue); }

  .stat-desc { font-size: 12px; color: var(--text-2); }

  /* CHART */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-1);
  }

  .card-body { padding: 18px; }

  /* MODULE LIST */
  .module-list { display: flex; flex-direction: column; gap: 4px; }

  .module-row {
    display: grid;
    grid-template-columns: 22px 1fr 80px 60px;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
  }

  .module-row:hover { background: var(--bg-3); border-color: var(--border); }

  .module-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
  }

  .module-name { font-size: 13px; font-weight: 500; }

  .module-bar-wrap {
    height: 4px;
    background: var(--bg-4);
    border-radius: 2px;
    overflow: hidden;
  }

  .module-bar { height: 100%; border-radius: 2px; transition: width 0.8s ease; }

  .module-score-badge {
    font-family: var(--font-mono);
    font-size: 12px;
    text-align: right;
  }

  /* ISSUES LIST */
  .issue-item {
    padding: 12px 14px;
    border-left: 3px solid;
    margin-bottom: 8px;
    background: var(--bg-3);
    border-radius: 0 4px 4px 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
  }

  .issue-item.critical { border-color: var(--red); }
  .issue-item.warning { border-color: var(--amber); }
  .issue-item.info { border-color: var(--blue); }

  .issue-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .issue-desc { font-size: 12px; color: var(--text-2); }

  .issue-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .issue-item.critical .issue-badge { background: rgba(255,71,87,0.15); color: var(--red); }
  .issue-item.warning .issue-badge { background: rgba(255,179,71,0.15); color: var(--amber); }
  .issue-item.info .issue-badge { background: rgba(78,205,196,0.15); color: var(--blue); }

  /* AUDIT MODULE VIEW */
  .module-header {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 20px;
  }

  .module-title-lg {
    font-family: var(--font-display);
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--text-0);
  }

  .module-desc { font-size: 13px; color: var(--text-2); margin-top: 6px; max-width: 600px; }

  .big-score {
    text-align: center;
  }

  .big-score-num {
    font-family: var(--font-display);
    font-size: 64px;
    line-height: 1;
  }

  .big-score-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-2);
  }

  /* CHECKLIST */
  .checklist-group {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .checklist-group-header {
    padding: 12px 18px;
    background: var(--bg-3);
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-2);
  }

  .check-item {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .check-item:last-child { border-bottom: none; }
  .check-item:hover { background: var(--bg-3); }

  .check-toggle {
    display: flex;
    gap: 4px;
  }

  .toggle-btn {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.12s;
    color: var(--text-2);
  }

  .toggle-btn:hover { border-color: var(--border-bright); }
  .toggle-btn.pass { background: var(--phosphor-glow); border-color: var(--phosphor-dim); color: var(--phosphor); }
  .toggle-btn.partial { background: rgba(255,179,71,0.12); border-color: var(--amber-dim); color: var(--amber); }
  .toggle-btn.fail { background: rgba(255,71,87,0.12); border-color: var(--red-dim); color: var(--red); }

  .check-text { }
  .check-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .check-detail { font-size: 12px; color: var(--text-2); }

  .check-weight {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    text-align: right;
    white-space: nowrap;
  }

  .check-impact {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .impact-high { background: rgba(255,71,87,0.12); color: var(--red); }
  .impact-med { background: rgba(255,179,71,0.12); color: var(--amber); }
  .impact-low { background: rgba(78,205,196,0.12); color: var(--blue); }

  /* NOTES TEXTAREA */
  .notes-area {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 12px;
    resize: vertical;
    min-height: 80px;
    border-radius: 3px;
    transition: border-color 0.15s;
    outline: none;
  }

  .notes-area:focus { border-color: var(--border-bright); }

  /* PROJECT SETUP MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: var(--bg-1);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    width: 540px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    padding: 22px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 24px;
    letter-spacing: 2px;
  }

  .modal-body { padding: 24px; }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-2);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--phosphor-dim); }

  .form-select {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 3px;
    outline: none;
    appearance: none;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    color: var(--text-2);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-title { font-family: var(--font-display); font-size: 28px; letter-spacing: 2px; color: var(--text-1); margin-bottom: 8px; }
  .empty-desc { font-size: 13px; margin-bottom: 24px; max-width: 340px; }

  /* REPORT SUMMARY */
  .summary-editor {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text-0);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 16px;
    resize: vertical;
    min-height: 200px;
    border-radius: 3px;
    outline: none;
    line-height: 1.7;
  }

  .summary-editor:focus { border-color: var(--border-bright); }

  /* PROGRESS BAR */
  .progress-track {
    height: 3px;
    background: var(--bg-4);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* TAGS */
  .tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 2px;
    border: 1px solid;
  }

  .tag-green { color: var(--phosphor); border-color: var(--phosphor-dim); background: var(--phosphor-glow); }
  .tag-amber { color: var(--amber); border-color: var(--amber-dim); background: rgba(255,179,71,0.1); }
  .tag-red { color: var(--red); border-color: var(--red-dim); background: rgba(255,71,87,0.1); }

  /* SECTION TITLE */
  .section-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-2);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* PRINT STYLES */
  @media print {
    .sidebar, .topbar, .btn, .toggle-btn, .notes-area { display: none !important; }
    .main { margin-left: 0 !important; }
    body { background: white !important; color: black !important; }
    .card, .module-header, .checklist-group, .stat-card {
      border: 1px solid #ccc !important;
      background: white !important;
      break-inside: avoid;
    }
    .content { padding: 20px !important; }
    .print-report { display: block !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }

  /* ANIMATIONS */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in { animation: fadeIn 0.3s ease forwards; }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(57,255,140,0); }
    50% { box-shadow: 0 0 12px 3px rgba(57,255,140,0.2); }
  }

let projects = {};
let currentProjectId = null;
let currentView = 'dashboard';
let currentModuleId = null;
let radarChart = null;

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function saveState() {
  localStorage.setItem('seo_audit_projects', JSON.stringify(projects));
}

function loadState() {
  const raw = localStorage.getItem('seo_audit_projects');
  if (raw) { try { projects = JSON.parse(raw); } catch(e) {} }
  const lastId = localStorage.getItem('seo_audit_current');
  if (lastId && projects[lastId]) { currentProjectId = lastId; }
}

// ─── PROJECT MANAGEMENT ───────────────────────────────────────────────────────
function openNewProject() {
  document.getElementById('f-client').value = '';
  document.getElementById('f-domain').value = '';
  document.getElementById('f-industry').value = '';
  document.getElementById('f-auditor').value = '';
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('f-client').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function createProject() {
  const client = document.getElementById('f-client').value.trim();
  const domain = document.getElementById('f-domain').value.trim();
  const industry = document.getElementById('f-industry').value.trim();
  const scope = document.getElementById('f-scope').value;
  const auditor = document.getElementById('f-auditor').value.trim();

  if (!client || !domain) { alert('Client name and domain are required.'); return; }

  const id = 'proj_' + Date.now();
  const checks = {};
  MODULES.forEach(m => {
    m.groups.forEach(g => {
      g.checks.forEach(c => {
        checks[m.id + '_' + c.id] = 'na'; // na | pass | partial | fail
      });
    });
  });

  projects[id] = {
    id, client, domain, industry, scope, auditor,
    created: new Date().toISOString(),
    checks,
    notes: {},
    summary: ''
  };

  currentProjectId = id;
  localStorage.setItem('seo_audit_current', id);
  saveState();
  closeModal();
  renderAll();
  showView('dashboard');
}

function selectProject(id) {
  currentProjectId = id;
  localStorage.setItem('seo_audit_current', id);
  renderAll();
  showView('dashboard');
}

function deleteProject(id) {
  if (!confirm('Delete this audit project? This cannot be undone.')) return;
  delete projects[id];
  if (currentProjectId === id) {
    const ids = Object.keys(projects);
    currentProjectId = ids.length ? ids[ids.length - 1] : null;
    if (currentProjectId) localStorage.setItem('seo_audit_current', currentProjectId);
    else localStorage.removeItem('seo_audit_current');
  }
  saveState();
  renderAll();
  showView('dashboard');
}

// ─── SCORING ──────────────────────────────────────────────────────────────────
function getModuleScore(projectId, moduleId) {
  const p = projects[projectId];
  if (!p) return null;
  const mod = MODULES.find(m => m.id === moduleId);
  if (!mod) return null;

  let totalWeight = 0, earnedWeight = 0;
  mod.groups.forEach(g => {
    g.checks.forEach(c => {
      const key = moduleId + '_' + c.id;
      const state = p.checks[key] || 'na';
      if (state !== 'na') {
        totalWeight += c.weight;
        if (state === 'pass') earnedWeight += c.weight;
        else if (state === 'partial') earnedWeight += c.weight * 0.5;
      }
    });
  });

  if (totalWeight === 0) return null;
  return Math.round((earnedWeight / totalWeight) * 100);
}

function getOverallScore(projectId) {
  const scores = MODULES.map(m => getModuleScore(projectId, m.id)).filter(s => s !== null);
  if (!scores.length) return null;
  return Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
}

function getScoreColor(score) {
  if (score === null) return '#5a6882';
  if (score >= 80) return '#39ff8c';
  if (score >= 60) return '#ffb347';
  return '#ff4757';
}

function getScoreGrade(score) {
  if (score === null) return '—';
  if (score >= 90) return 'A';
  if (score >= 80) return 'B';
  if (score >= 70) return 'C';
  if (score >= 60) return 'D';
  return 'F';
}

function getScoreClass(score) {
  if (score === null) return 'score-na';
  if (score >= 75) return 'score-high';
  if (score >= 50) return 'score-mid';
  return 'score-low';
}

function getCheckStats(projectId) {
  const p = projects[projectId];
  if (!p) return { pass: 0, partial: 0, fail: 0, na: 0 };
  const vals = Object.values(p.checks);
  return {
    pass: vals.filter(v => v === 'pass').length,
    partial: vals.filter(v => v === 'partial').length,
    fail: vals.filter(v => v === 'fail').length,
    na: vals.filter(v => v === 'na').length,
  };
}

function getPriorityIssues(projectId) {
  const p = projects[projectId];
  if (!p) return [];
  const issues = [];
  MODULES.forEach(m => {
    m.groups.forEach(g => {
      g.checks.forEach(c => {
        const key = m.id + '_' + c.id;
        const state = p.checks[key];
        if (state === 'fail' || state === 'partial') {
          issues.push({ ...c, module: m.name, moduleId: m.id, state, key });
        }
      });
    });
  });
  const order = { high: 0, med: 1, low: 2 };
  return issues.sort((a, b) => {
    if (order[a.impact] !== order[b.impact]) return order[a.impact] - order[b.impact];
    return b.weight - a.weight;
  });
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
function showView(view, moduleId) {
  currentView = view;
  currentModuleId = moduleId || null;

  // Update nav active states
  document.querySelectorAll('.nav-item[id^="nav-"]').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');

  if (!currentProjectId) {
    renderEmptyState();
    return;
  }

  if (view === 'dashboard') renderDashboard();
  else if (view === 'module') renderModule(moduleId);
  else if (view === 'report') renderReport();
}

      <div class="dashboard-header">

  const scoreColor = getScoreColor(score);

        <div class="check-item" id="check-row-${key}">

              onclick="setCheck('${key}','pass')" data-tip="Pass">✓</button>
            <button class="toggle-btn ${state === 'partial' ? 'partial' : ''}"
              onclick="setCheck('${key}','partial')" data-tip="Partial">~</button>
            <button class="toggle-btn ${state === 'fail' ? 'fail' : ''}"

      <div class="module-header">

          <div class="module-title-lg">${mod.icon} ${mod.name}</div>

function setCheck(key, state) {
  const p = projects[currentProjectId];
  if (!p) return;
  // Toggle off if already set
  if (p.checks[key] === state) p.checks[key] = 'na';
  else p.checks[key] = state;
  saveState();

  // Update just the buttons without full re-render
  const row = document.getElementById('check-row-' + key);
  if (row) {
    row.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.className = 'toggle-btn';
    });
    const currentState = p.checks[key];
    if (currentState !== 'na') {
      const stateMap = { pass: 0, partial: 1, fail: 2 };
      const btns = row.querySelectorAll('.toggle-btn');
      if (btns[stateMap[currentState]]) {
        btns[stateMap[currentState]].classList.add(currentState);
      }
    }
  }
  updateSidebarNav();
}

function saveNote(key, value) {
  const p = projects[currentProjectId];
  if (!p) return;
  p.notes[key] = value;
  saveState();
}

function generateSummary(p, overall, stats, issues) {
  const grade = getScoreGrade(overall);
  const totalChecks = Object.keys(p.checks).length;
  const completed = totalChecks - stats.na;
  const topIssues = issues.slice(0, 3).map(i => i.name).join(', ');
  const bestModules = MODULES
    .map(m => ({ name: m.name, score: getModuleScore(currentProjectId, m.id) }))
    .filter(m => m.score !== null && m.score >= 75)
    .sort((a, b) => b.score - a.score)
    .slice(0, 3)
    .map(m => m.name);

  return `SEO Audit Report — ${p.client} (${p.domain})
Prepared by: ${p.auditor || 'SEO Analyst'} | Date: ${new Date(p.created).toLocaleDateString()}

OVERALL ASSESSMENT
${p.client}'s website received an overall SEO score of ${overall !== null ? overall + '/100 (Grade: ' + grade + ')' : 'N/A (audit incomplete)'}. This audit evaluated ${completed} of ${totalChecks} available checks across 10 SEO modules.

STRENGTHS
${bestModules.length ? 'The site demonstrates strong performance in: ' + bestModules.join(', ') + '.' : 'Complete all module checks to identify strengths.'}

KEY ISSUES
${topIssues ? 'The highest-priority items requiring immediate attention are: ' + topIssues + '.' : 'No critical issues detected yet — continue completing the audit.'}
${stats.fail > 0 ? `A total of ${stats.fail} checks are failing and require immediate remediation.` : ''}
${stats.partial > 0 ? `${stats.partial} items are partially implemented and should be completed.` : ''}

RECOMMENDATIONS
1. Address all critical failures (red) before tactical improvements.
2. Prioritize high-impact issues for maximum ranking benefit.
3. Schedule a follow-up audit in 90 days to measure progress.
4. Focus link building efforts on modules scoring below 60%.

This report was generated using SEO Audit Pro. All findings are based on a manual expert evaluation.`;
}

function saveSummary(val) {
  const p = projects[currentProjectId];
  if (p) { p.summary = val; saveState(); }
}

function regenerateSummary() {
  const p = projects[currentProjectId];
  if (!p) return;
  const overall = getOverallScore(currentProjectId);
  const stats = getCheckStats(currentProjectId);
  const issues = getPriorityIssues(currentProjectId);
  const newSummary = generateSummary(p, overall, stats, issues);
  p.summary = newSummary;
  saveState();
  const el = document.getElementById('summary-text');
  if (el) el.value = newSummary;
}

// ─── EXPORT / PRINT ───────────────────────────────────────────────────────────
function exportReport() {
  showView('report');
  setTimeout(() => {
    window.print();
  }, 400);
}

// ─── SIDEBAR RENDERING ────────────────────────────────────────────────────────
function updateSidebarNav() {
  // Module nav
  const moduleNav = document.getElementById('module-nav');
  if (moduleNav) {
    moduleNav.innerHTML = MODULES.map(m => {
      const score = currentProjectId ? getModuleScore(currentProjectId, m.id) : null;
      const isActive = currentView === 'module' && currentModuleId === m.id;
      return `
        <div class="nav-item ${isActive ? 'active' : ''}" onclick="showView('module','${m.id}')">
          <span class="nav-icon">${m.icon}</span>
          <span>${m.name}</span>
          <span class="nav-score ${getScoreClass(score)}">${score !== null ? score : '—'}</span>
        </div>`;
    }).join('');
  }

  // Report nav active state
  if (currentView === 'report') {
    document.getElementById('nav-report')?.classList.add('active');
    document.getElementById('nav-dashboard')?.classList.remove('active');
  } else if (currentView === 'dashboard') {
    document.getElementById('nav-dashboard')?.classList.add('active');
    document.getElementById('nav-report')?.classList.remove('active');
  }

  // Projects list
  const projectsList = document.getElementById('projects-list');
  if (projectsList) {
    const ids = Object.keys(projects);
    if (!ids.length) {
      projectsList.innerHTML = `<div style="padding:8px 20px;font-size:11px;color:var(--text-3);">No projects yet</div>`;
    } else {
      projectsList.innerHTML = ids.map(id => {
        const proj = projects[id];
        const score = getOverallScore(id);
        return `
          <div class="project-item ${id === currentProjectId ? 'active' : ''}" onclick="selectProject('${id}')">
            <div class="project-domain">${proj.domain || proj.client}</div>
            <div class="project-meta">
              <span>${proj.client}</span>
              <span style="color:${getScoreColor(score)};font-family:var(--font-mono);">${score !== null ? score + '%' : '—'}</span>
            </div>
          </div>`;
      }).join('');
    }
  }

  // Topbar
  if (currentProjectId) {
    const p = projects[currentProjectId];
    document.getElementById('topbar-domain').innerHTML = `<span>DOMAIN</span> ${p.domain}`;
    document.getElementById('topbar-date').textContent = new Date(p.created).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }
}

function renderAll() {
  updateSidebarNav();
  if (currentView === 'dashboard') renderDashboard();
  else if (currentView === 'module' && currentModuleId) renderModule(currentModuleId);
  else if (currentView === 'report') renderReport();
  else renderDashboard();
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'n' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); openNewProject(); }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
updateSidebarNav();
if (currentProjectId) {
  renderDashboard();
} else {
  renderEmptyState();
}
</script>
</body>
</html>
